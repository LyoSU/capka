name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        if: (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/lyosu/unclaw/blob/master/docs/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'LyoSU,dependabot[bot]'
          custom-notsigned-prcomment: 'Thanks for your PR. Please sign the [CLA](https://github.com/lyosu/unclaw/blob/master/docs/CLA.md) by commenting below.'

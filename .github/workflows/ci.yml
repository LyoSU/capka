name: CI

# Gate every push to master and every PR on the same checks a maintainer runs
# locally: typecheck, lint, unit tests, and a production build. Database-backed
# integration tests run separately against an ephemeral PostgreSQL service.
on:
  push:
    branches: [master]
  pull_request:

# A newer push to the same ref cancels the in-progress run — don't burn minutes
# on stale commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sandbox-controller/package-lock.json

      - run: npm ci
      # The sandbox-controller is a separate Node package; its unit tests (run in
      # the same vitest pass) import its own deps (pg), so install them too.
      - run: npm ci --prefix sandbox-controller

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  integration-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: Capka
          POSTGRES_PASSWORD: Capka
          POSTGRES_DB: Capka
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U Capka -d Capka"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://Capka:Capka@localhost:5432/Capka
      RUN_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Test database integrations
        run: npm run test:integration:db

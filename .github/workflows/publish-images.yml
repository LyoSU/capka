name: Publish images

# Build and push the prebuilt images to GHCR on every release tag (vX.Y.Z), so a
# box can `docker compose pull` instead of building locally — no build toolchain
# needed on the host. The base compose keeps its `build:` stanzas as a fallback,
# so cloning + building still works without any of these images existing.
#
# First run prerequisites (one-time, in the GitHub repo): Settings → Actions →
# Workflow permissions must allow read/write, and the resulting packages default
# to private — make them public (or pull with a token) for unauthenticated pulls.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: platform
            context: .
            file: Dockerfile
            target: runner
          - name: controller
            context: ./sandbox-controller
            file: ./sandbox-controller/Dockerfile
            target: ""
          - name: sandbox
            context: .
            file: Dockerfile.sandbox
            target: ""
    steps:
      - uses: actions/checkout@v5

      # QEMU lets a single amd64 runner cross-build the arm64 variant too, so each
      # published image is a multi-arch manifest list. This is what lets Capka run
      # on cheap ARM VPSes (e.g. Hetzner CAX) — the host pulls its native arch and
      # never falls back to compiling locally. arm64 emulation is slower, but this
      # only runs on release tags, not per push.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # metadata-action lowercases the image name, so a mixed-case owner (LyoSU)
      # still produces a valid ghcr.io/lyosu/capka-* reference.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/capka-${{ matrix.name }}
          # Keep the `v` prefix so image tags match the git tag (v0.1.0): the
          # default {{version}} pattern strips it, which would make the scripts'
          # `:v0.1.0` pull 404 and fall back to a local build.
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          # Stamp the version into the platform image so Settings → Updates can
          # report it. Use the exact git ref (v0.1.0 on a tag) so it matches the
          # release tag the in-app check compares against. controller/sandbox
          # ignore these args.
          build-args: |
            CAPKA_VERSION=${{ github.ref_name }}
            CAPKA_GIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Layers dev-only conveniences over the secure base: zero-config default secrets,
# host-published ports bound to 127.0.0.1 (loopback only — never the public iface),
# and hot-reloading `next dev`.
services:
  postgres:
    environment:
      POSTGRES_PASSWORD: Capka
    ports:
      - "127.0.0.1:5432:5432"

  sandbox-controller:
    environment:
      - CONTROLLER_SECRET=capka-sandbox-secret
      # Pin to the dev default password too. The base compose interpolates
      # ${POSTGRES_PASSWORD} (from .env) into the controller's DATABASE_URL, but
      # dev initialises the postgres volume with `Capka` (above). Without this
      # override the controller auths with the .env password and crash-loops
      # against a postgres that only knows the dev one.
      - DATABASE_URL=postgresql://Capka:Capka@postgres:5432/Capka
      # Opt-in escape hatch — lets the controller boot with the default secret.
      # NEVER set this outside local development.
      - ALLOW_DEFAULT_SECRET=true
    ports:
      - "127.0.0.1:3001:3001"

  platform:
    build:
      context: .
      target: dev # full deps, no prod build — gives `next dev` hot-reload
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql://Capka:Capka@postgres:5432/Capka
      - SANDBOX_CONTROLLER_URL=http://sandbox-controller:3001
      - CONTROLLER_SECRET=capka-sandbox-secret

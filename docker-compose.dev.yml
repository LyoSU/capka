# Usage: npm run docker:dev
#   (= docker compose -f docker-compose.yml -f docker-compose.build.yml \
#        -f docker-compose.dev.yml up --build)
# Layers dev-only conveniences over the base + build-from-source overlay:
# zero-config default secrets, host-published ports bound to 127.0.0.1 (loopback
# only — never the public iface), and hot-reloading `next dev` (target: dev
# overrides the build overlay's prod `runner` target). Every published port here —
# postgres, sandbox-controller, AND platform — pins 127.0.0.1; the base defaults
# platform to 0.0.0.0 (zero-config prod), so the dev platform port is overridden below.
services:
  postgres:
    environment:
      POSTGRES_PASSWORD: Capka
    ports:
      - "127.0.0.1:5432:5432"

  sandbox-controller:
    environment:
      - CONTROLLER_SECRET=capka-sandbox-secret
      # Pin to the dev default password too. The base compose interpolates
      # ${POSTGRES_PASSWORD} (from .env) into the controller's DATABASE_URL, but
      # dev initialises the postgres volume with `Capka` (above). Without this
      # override the controller auths with the .env password and crash-loops
      # against a postgres that only knows the dev one.
      - DATABASE_URL=postgresql://Capka:Capka@postgres:5432/Capka
      # Opt-in escape hatch — lets the controller boot with the default secret.
      # NEVER set this outside local development.
      - ALLOW_DEFAULT_SECRET=true
    ports:
      - "127.0.0.1:3001:3001"

  platform:
    # Tag the dev build separately so it never clobbers the pulled prod
    # `capka-platform:latest` locally — otherwise a later `docker compose up`
    # (pull path) would run this `next dev` image instead of `node server.js`.
    image: capka-platform:dev
    build:
      context: .
      target: dev # full deps, no prod build — gives `next dev` hot-reload
    command: npm run dev
    # Bind the dev server to loopback like the other dev ports — the base compose
    # defaults PLATFORM_BIND to 0.0.0.0 (zero-config prod), which would otherwise
    # expose the hot-reload dev server to the LAN. `!override` REPLACES the base
    # ports list — without it compose *merges* the two entries (0.0.0.0:3000 +
    # 127.0.0.1:3000), the container binds 3000 twice and self-collides with
    # "address already in use".
    ports: !override
      - "127.0.0.1:3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql://Capka:Capka@postgres:5432/Capka
      - SANDBOX_CONTROLLER_URL=http://sandbox-controller:3001
      - CONTROLLER_SECRET=capka-sandbox-secret

# Coolify-tailored compose (read by Coolify; docker_compose_location=/docker-compose.yaml).
# Derived from docker-compose.yml, with deploy-safety changes for a shared host:
#   * postgres & sandbox-controller use `expose` instead of host `ports:` —
#     on this host Docker publishes ports past UFW, so binding 5432/3001 to the
#     host would leak Postgres and the controller to the internet.
#   * platform is routed through Coolify's Traefik via the SERVICE_FQDN magic var
#     instead of a host port publish (TLS + Cloudflare stay in front).
# Internal service-to-service traffic uses compose-network DNS names.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: unClaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: unClaw
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unClaw"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NOTE: the one-shot `sandbox` image-builder service was removed. The controller
  # now pulls the sandbox image on demand (ensureRuntime, pull-if-missing), so a
  # Coolify image prune is self-healing instead of fatal — which is exactly the
  # incident this design fixes. The image comes from ghcr (pinned via UNCLAW_VERSION).

  # Restricts the Docker API the controller can reach (container + exec + image
  # inspect/pull); the raw host socket is mounted read-only here alone, on an
  # isolated network. Defense-in-depth, not a hard root boundary — see README.
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      - CONTAINERS=1
      - EXEC=1
      - POST=1
      # Lets the controller inspect + pull the sandbox image (ensureRuntime).
      # DELETE stays off; see docker-compose.yml note re POST /images/load.
      - IMAGES=1
      # INFO (read-only GET /info) — required by the fail-closed gVisor runtime
      # probe at boot; without it the secure profile gets 403 and crash-loops.
      - INFO=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker-proxy
    restart: unless-stopped

  sandbox-controller:
    build: ./sandbox-controller
    expose:
      - "3001"
    # Reaches the daemon via the restricted socket-proxy (DOCKER_HOST), not the
    # host socket. Roll back: drop DOCKER_HOST, re-add the docker.sock bind.
    volumes:
      - ./data:/data
    environment:
      - CONTROLLER_SECRET=${CONTROLLER_SECRET}
      - DOCKER_HOST=tcp://socket-proxy:2375
      - DATA_ROOT=/data/storage
      # Durable session state (replaces in-memory Map); reconciles on boot.
      - DATABASE_URL=postgresql://unClaw:${POSTGRES_PASSWORD}@postgres:5432/unClaw
      - COMPUTE_BACKEND=docker
      - WORKSPACE_STORE=local
      # Isolation runtime. Default runc — boots immediately. gVisor is OPT-IN: set
      # SANDBOX_RUNTIME=runsc AND install gVisor on the host (scripts/install-gvisor.sh)
      # for the hardened, fail-closed secure profile (untrusted/multi-tenant use).
      - SANDBOX_RUNTIME=${SANDBOX_RUNTIME:-runc}
      # NOTE: no HOST_DATA_ROOT here. Docker resolves sibling-container bind sources
      # on the daemon host, and the controller now auto-detects that host path by
      # inspecting its own /data mount at startup (robust under Coolify, where ${PWD}
      # was unreliable). Only set HOST_DATA_ROOT to override the auto-detected value.
      # Pinned ghcr image; controller pulls it on demand (ensureRuntime).
      - SANDBOX_IMAGE=ghcr.io/lyosu/unclaw-sandbox:${UNCLAW_VERSION:-latest}
      # Keep test resource usage modest on a shared, RAM-tight host.
      - SANDBOX_MEMORY_MB=384
      - MAX_SESSIONS_PER_USER=2
      # How long a sandbox CONTAINER may sit idle before it's stopped. Only the
      # compute is reclaimed — the workspace (files + row) stays and is revived on
      # the next tool call. Default 15 min.
      - SANDBOX_IDLE_TTL_MS=${SANDBOX_IDLE_TTL_MS:-900000}
      # How long a WORKSPACE may go unused before its files are deleted (row + disk).
      # This is the real "how long do my files live" knob. Default 30d.
      - WORKSPACE_TTL_MS=${WORKSPACE_TTL_MS:-2592000000}
      # Grace for TRULY orphaned dirs (no DB row at all — e.g. pre-migration junk)
      # before the sweep removes them. Stopped workspaces keep their row, so this no
      # longer governs normal files. Default 7d.
      - GC_GRACE_MS=${GC_GRACE_MS:-604800000}
      # Sandbox egress is controlled in the admin panel (Security → Internet access).
    networks:
      - default
      - docker-proxy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      socket-proxy:
        condition: service_started
    restart: unless-stopped

  platform:
    build: .
    expose:
      - "3000"
    # This host fronts apps with its own nginx (Coolify's Traefik is stopped
    # here), so publish to loopback for nginx to reverse-proxy. 127.0.0.1 only —
    # never exposed past UFW. On a host that uses Coolify's Traefik, drop this.
    ports:
      - "127.0.0.1:3100:3000"
    volumes:
      - ./data:/app/data
    environment:
      # One knob drives both Coolify's Traefik routing AND the app's public
      # origin — no domain is hardcoded here. Set PUBLIC_URL in the environment
      # (Coolify env / .env), e.g. https://unclaw.example.com.
      - SERVICE_FQDN_PLATFORM_3000=${PUBLIC_URL}
      - PUBLIC_URL=${PUBLIC_URL}
      - DATABASE_URL=postgresql://unClaw:${POSTGRES_PASSWORD}@postgres:5432/unClaw
      - SANDBOX_CONTROLLER_URL=http://sandbox-controller:3001
      - CONTROLLER_SECRET=${CONTROLLER_SECRET}
      - UNCLAW_MASTER_KEY=${UNCLAW_MASTER_KEY}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      sandbox-controller:
        condition: service_healthy
    restart: unless-stopped

networks:
  # Isolated controller↔socket-proxy link; the Docker API isn't reachable from
  # the rest of the stack.
  docker-proxy:

volumes:
  postgres-data:

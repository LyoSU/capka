services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: unClaw
      POSTGRES_PASSWORD: unClaw
      POSTGRES_DB: unClaw
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unClaw"]
      interval: 5s
      timeout: 5s
      retries: 5

  platform:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql://unClaw:unClaw@postgres:5432/unClaw
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:

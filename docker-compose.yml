# Base compose — used by `docker compose up` and `npm run docker:prod`.
# SECURITY: postgres & sandbox-controller are NOT published to the host here.
# On many hosts Docker publishes ports past the firewall (UFW), which would leak
# Postgres and the root-equivalent controller to the internet. They talk to each
# other over the compose network by DNS name; only `platform` is published.
# Secrets have NO defaults: prod must supply POSTGRES_PASSWORD, CONTROLLER_SECRET
# and UNCLAW_MASTER_KEY (via env / .env). For local debugging with defaults and
# host-published ports, layer docker-compose.dev.yml (see `npm run docker:dev`).
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: unClaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: unClaw
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unClaw"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    image: unclaw-sandbox
    entrypoint: ["echo", "sandbox image built"]

  sandbox-controller:
    build: ./sandbox-controller
    # Prebuilt image (published by .github/workflows/publish-images.yml). `build:`
    # stays as a fallback — `up --build` builds locally, `pull` fetches the image.
    image: ghcr.io/lyosu/unclaw-controller:latest
    expose:
      - "3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    environment:
      - CONTROLLER_SECRET=${CONTROLLER_SECRET}
      - DATA_ROOT=/data/storage
      # Real host path of ./data/storage — needed so sandbox bind mounts resolve
      # on the Docker daemon host (esp. Docker Desktop). Defaults to PWD-based.
      - HOST_DATA_ROOT=${PWD}/data/storage
      - SANDBOX_IMAGE=unclaw-sandbox
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      sandbox:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped

  platform:
    build: .
    # Prebuilt image (published on release tags). `build:` stays as a fallback so
    # cloning + building works with no image present; `pull` fetches the image.
    image: ghcr.io/lyosu/unclaw-platform:latest
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql://unClaw:${POSTGRES_PASSWORD}@postgres:5432/unClaw
      - SANDBOX_CONTROLLER_URL=http://sandbox-controller:3001
      - CONTROLLER_SECRET=${CONTROLLER_SECRET}
      - UNCLAW_MASTER_KEY=${UNCLAW_MASTER_KEY}
      # Public origin. Optional: unset → derived from proxy headers (X-Forwarded-*).
      # Set it (recommended in prod) so the value can't be spoofed via headers.
      - PUBLIC_URL=${PUBLIC_URL:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      sandbox-controller:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:

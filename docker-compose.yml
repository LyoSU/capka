# Canonical stack — this is the file you deploy.
#
# PULL-ONLY: it references the prebuilt GHCR images (published on each release),
# so `docker compose up -d` on a fresh box pulls and runs them with no build
# toolchain. This is the file a runner (Coolify) points at, and the one
# `scripts/up.sh` / `install.sh` bring up. Pin a release with CAPKA_VERSION
# (e.g. v0.1.6); unset ⇒ :latest.
#
# Overlays (layer with `-f docker-compose.yml -f …`):
#   docker-compose.dev.yml     local dev — hot reload, dev secrets, loopback ports
#   docker-compose.build.yml   build the images from source instead of pulling
#   docker-compose.tls.yml     automatic HTTPS via Caddy
#   docker-compose.backup.yml  scheduled pg_dump sidecar
#
# SECURITY: postgres & sandbox-controller are never published — only `platform`
# is, and only on 127.0.0.1 (a host reverse-proxy fronts it). Secrets have NO
# defaults: supply POSTGRES_PASSWORD, CONTROLLER_SECRET, CAPKA_MASTER_KEY via
# .env (`up.sh` generates them). Services reach each other by compose DNS name.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: Capka
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: Capka
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Expose the unix socket to the db-init one-shot so it can reset the role
      # password over a trusted local connection (see db-init below).
      - postgres-run:/var/run/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Capka"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Resource ceilings so one runaway service can't take the host down. Generous
    # by default (they cap true runaway, not normal load); every value is
    # env-overridable to tune for the box.
    mem_limit: ${POSTGRES_MEM_LIMIT:-2g}
    pids_limit: ${POSTGRES_PIDS_LIMIT:-512}

  # One-shot: keep the Postgres role password in sync with POSTGRES_PASSWORD. The
  # official image only applies POSTGRES_PASSWORD when it INITIALISES a fresh
  # volume, so a volume that outlives a password change (reinstall / rotation)
  # keeps the old password and the app crash-loops on auth. Runs on EVERY deploy
  # path, including Coolify and plain `docker compose up` (not just the install
  # scripts). No-op when POSTGRES_PASSWORD is unset (dev). Best-effort: it never
  # fails the stack (a fail-hard here could block a perfectly healthy deploy on a
  # transient blip; a genuinely unhealable drift surfaces in the platform logs).
  #
  # Strategy: PROBE over TCP with the desired password first — if it already
  # works (fresh volume, or already synced) we exit success and touch nothing, so
  # the service_completed_successfully gate actually MEANS "password verified",
  # even on an orchestrator that didn't mount the local socket. Only on an auth
  # failure (real drift) do we reset it over the LOCAL trusted socket (shared via
  # postgres-run, no current password needed), then re-verify over TCP.
  db-init:
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - postgres-run:/var/run/postgresql
    environment:
      - DESIRED_PW=${POSTGRES_PASSWORD:-}
    entrypoint:
      - sh
      - -euc
      - |
        [ -n "$${DESIRED_PW:-}" ] || { echo "db-init: POSTGRES_PASSWORD unset — skipping"; exit 0; }
        if PGPASSWORD="$$DESIRED_PW" psql -h postgres -U Capka -d Capka -tAc 'select 1' >/dev/null 2>&1; then
          echo "db-init: database password already in sync"
          exit 0
        fi
        esc=$$(printf '%s' "$$DESIRED_PW" | sed "s/'/''/g")
        psql -h /var/run/postgresql -U Capka -d Capka -v ON_ERROR_STOP=1 \
          -c "ALTER ROLE \"Capka\" WITH PASSWORD '$$esc'" >/dev/null 2>&1 || true
        if PGPASSWORD="$$DESIRED_PW" psql -h postgres -U Capka -d Capka -tAc 'select 1' >/dev/null 2>&1; then
          echo "db-init: database password synced with POSTGRES_PASSWORD"
        else
          echo "db-init: WARNING - could not sync password (the app may fail to authenticate — check its logs)"
        fi
    restart: "no"

  # Narrows the Docker API the controller can reach: only container + exec
  # endpoints, plus image inspect/pull (IMAGES) so the controller can self-heal a
  # pruned sandbox image, and read-only GET /info (INFO) required by the
  # fail-closed gVisor runtime probe. DELETE stays off. The raw host socket is
  # mounted read-only HERE ALONE, on an isolated network the controller alone can
  # reach — defense-in-depth, not a hard root boundary (see SECURITY.md).
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      - CONTAINERS=1
      - EXEC=1
      - POST=1
      - IMAGES=1
      - INFO=1
    volumes:
      # Host Docker socket, read-only. Parameterized so a ROOTLESS daemon (whose
      # socket lives at /run/user/<uid>/docker.sock) works by setting DOCKER_SOCKET
      # in .env — the default is the standard rootful path, unchanged. See SECURITY.md.
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
    networks:
      - docker-proxy
    restart: unless-stopped
    mem_limit: ${SOCKET_PROXY_MEM_LIMIT:-128m}
    pids_limit: ${SOCKET_PROXY_PIDS_LIMIT:-128}

  sandbox-controller:
    image: ghcr.io/lyosu/capka-controller:${CAPKA_VERSION:-latest}
    # `up -d`'s default pull policy only fetches an image that's missing
    # locally — a redeploy that reuses the same tag (e.g. Coolify's git-based
    # "Redeploy", which never runs `docker compose pull`) would silently keep
    # running the stale cached bits. Always check the registry instead.
    pull_policy: always
    expose:
      - "3001"
    # Reaches the daemon via the restricted socket-proxy (DOCKER_HOST), never the
    # host socket. It pulls the sandbox image on demand (ensureRuntime), so no
    # one-shot builder service is needed here.
    volumes:
      - ./data:/data
    environment:
      - CONTROLLER_SECRET=${CONTROLLER_SECRET}
      - DOCKER_HOST=tcp://socket-proxy:2375
      - DATA_ROOT=/data/storage
      # Durable session state; reconciles against the daemon on boot.
      - DATABASE_URL=postgresql://Capka:${POSTGRES_PASSWORD}@postgres:5432/Capka
      - COMPUTE_BACKEND=docker
      - WORKSPACE_STORE=local
      # Default runc — boots on any Docker host. gVisor is opt-in: set runsc AND
      # install gVisor on the host (scripts/install-gvisor.sh) for the hardened,
      # fail-closed secure profile (untrusted/multi-tenant workloads).
      - SANDBOX_RUNTIME=${SANDBOX_RUNTIME:-runc}
      # Controller auto-detects the daemon-host path backing ./data by inspecting
      # its own mount at boot, so bind mounts resolve regardless of launch cwd.
      # Set HOST_DATA_ROOT only to override.
      - SANDBOX_IMAGE=ghcr.io/lyosu/capka-sandbox:${CAPKA_VERSION:-latest}
      # Egress kill-switch. Default true (agents reach the internet; granted
      # egress is still firewalled off private/metadata ranges). Set false to
      # hard-forbid egress regardless of the in-app toggle (untrusted tenants).
      - SANDBOX_ALLOW_NETWORK=${SANDBOX_ALLOW_NETWORK:-true}
      # Optional perimeter for host folder mounts (folder access is off by default;
      # server folders are admin-only + confirm-gated). When set (colon-separated
      # roots), only subpaths of these may be mounted, on top of the system-path
      # denylist. Unset → any non-system path, gated by the admin confirm.
      - SANDBOX_MOUNT_ALLOW=${SANDBOX_MOUNT_ALLOW:-}
      # Per-sandbox RAM. The /tmp + /opt/mcp tmpfs are charged to this same
      # cgroup, so keep headroom.
      - SANDBOX_MEMORY_MB=${SANDBOX_MEMORY_MB:-1024}
      # gVisor runtime threads count against this budget. 256 leaves enough
      # headroom for image/document rendering while still containing fork bombs.
      - SANDBOX_PIDS_LIMIT=${SANDBOX_PIDS_LIMIT:-256}
      - MAX_SESSIONS_PER_USER=${MAX_SESSIONS_PER_USER:-2}
      # Stop an idle CONTAINER after this (files + row survive, revived on the
      # next tool call).
      - SANDBOX_IDLE_TTL_MS=${SANDBOX_IDLE_TTL_MS:-900000}
      # Delete a WORKSPACE (row + disk) unused this long — the real "how long do
      # my files live" knob.
      - WORKSPACE_TTL_MS=${WORKSPACE_TTL_MS:-2592000000}
      # Grace for TRULY orphaned dirs (no DB row) before the sweep removes them.
      - GC_GRACE_MS=${GC_GRACE_MS:-604800000}
    networks:
      - default
      - docker-proxy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      # Readiness is gated only on reconcile now (the sandbox-image pull runs in
      # the background — see server.js boot), so the controller goes healthy in
      # seconds. This grace just covers reconcile + daemon-connect retries on a
      # busy host without a spurious early "unhealthy". Failing checks during
      # start_period don't count.
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      # Wait for the password sync so the controller's DATABASE_URL auth can't
      # race a drifted password on boot.
      db-init:
        condition: service_completed_successfully
      socket-proxy:
        condition: service_started
    restart: unless-stopped
    mem_limit: ${CONTROLLER_MEM_LIMIT:-1g}
    pids_limit: ${CONTROLLER_PIDS_LIMIT:-512}

  platform:
    image: ghcr.io/lyosu/capka-platform:${CAPKA_VERSION:-latest}
    pull_policy: always
    # Published on all interfaces by default so it works out of the box with zero
    # config. Behind a reverse proxy (or on a host where Docker publishes past the
    # firewall), set PLATFORM_BIND=127.0.0.1 to bind loopback-only and let the
    # proxy reach it via localhost / the compose network. Container port is 3000.
    ports:
      - "${PLATFORM_BIND:-0.0.0.0}:${PLATFORM_PORT:-3000}:3000"
    # Let the in-process worker drain on redeploy: it stops claiming new tasks on
    # SIGTERM and lets running turns finish (DRAIN_GRACE_MS=25s in worker.ts)
    # before exiting. Must exceed that so Docker doesn't SIGKILL mid-drain.
    stop_grace_period: 35s
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql://Capka:${POSTGRES_PASSWORD}@postgres:5432/Capka
      - SANDBOX_CONTROLLER_URL=http://sandbox-controller:3001
      - CONTROLLER_SECRET=${CONTROLLER_SECRET}
      - CAPKA_MASTER_KEY=${CAPKA_MASTER_KEY}
      # Public origin. Set it (recommended in prod) so it can't be spoofed via
      # proxy headers; unset → derived from X-Forwarded-*.
      - PUBLIC_URL=${PUBLIC_URL:-}
      # Opt-in hardening for the first-run wizard — require this token to claim the
      # admin account on a public deploy. Unset ⇒ frictionless setup.
      - SETUP_TOKEN=${SETUP_TOKEN:-}
      # Bounded daily database cleanup. Zero days disables retention for that
      # table; live tasks, suspended turns, and pending spend holds are preserved.
      - TASK_RETENTION_DAYS=${TASK_RETENTION_DAYS:-30}
      - USAGE_RETENTION_DAYS=${USAGE_RETENTION_DAYS:-365}
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-365}
      - DB_RETENTION_BATCH_SIZE=${DB_RETENTION_BATCH_SIZE:-1000}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      # Password sync runs before the app connects (heals reinstall/rotation drift).
      db-init:
        condition: service_completed_successfully
      # service_started, NOT service_healthy: login and the first-run setup wizard
      # never touch the sandbox, so the app must come up and be usable while the
      # controller is still warming (pulling the ~7.5 GB image on a fresh box).
      # Gating platform on controller health was the first-run deadlock — a slow
      # image pull tripped the controller "unhealthy" and aborted `up -d` with
      # "dependency failed to start". Only actual sandbox tool calls wait for the
      # controller; those already tolerate its 503 (see src/lib/sandbox/client.ts).
      sandbox-controller:
        condition: service_started
    restart: unless-stopped
    mem_limit: ${PLATFORM_MEM_LIMIT:-4g}
    pids_limit: ${PLATFORM_PIDS_LIMIT:-1024}

networks:
  # Isolated controller↔socket-proxy link; the (restricted) Docker API isn't
  # reachable from the rest of the stack.
  docker-proxy:

volumes:
  postgres-data:
  # Postgres unix socket dir, shared with db-init for the trusted local password reset.
  postgres-run:

# Base compose — used by `docker compose up` and `npm run docker:prod`.
# SECURITY: postgres & sandbox-controller are NOT published to the host here.
# On many hosts Docker publishes ports past the firewall (UFW), which would leak
# Postgres and the root-equivalent controller to the internet. They talk to each
# other over the compose network by DNS name; only `platform` is published.
# Secrets have NO defaults: prod must supply POSTGRES_PASSWORD, CONTROLLER_SECRET
# and CAPKA_MASTER_KEY (via env / .env). For local debugging with defaults and
# host-published ports, layer docker-compose.dev.yml (see `npm run docker:dev`).
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: Capka
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: Capka
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Capka"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Resource ceilings so one runaway service (memory leak, fork bomb) can't take
    # the whole host down with it. Defaults are deliberately generous — they cap
    # true runaway, not normal load — and every value is env-overridable to tune
    # for the box. (mem_limit/pids_limit apply with `docker compose up`; the swarm
    # `deploy.resources` block would be ignored here.)
    mem_limit: ${POSTGRES_MEM_LIMIT:-2g}
    pids_limit: ${POSTGRES_PIDS_LIMIT:-512}

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    # Prebuilt image (published by .github/workflows/publish-images.yml). `build:`
    # stays as a fallback so cloning + building works with no image present.
    image: ghcr.io/lyosu/capka-sandbox:${CAPKA_VERSION:-latest}
    entrypoint: ["echo", "sandbox image built"]

  # Narrows the Docker API the controller can reach: only container + exec
  # endpoints (create/start/stop/remove/exec), everything else (build, pull,
  # images, networks, volumes, swarm, host info) denied. The raw host socket is
  # mounted ONLY here (read-only) and lives on an isolated network the controller
  # alone can reach. This is defense-in-depth, NOT a hard root boundary — a
  # compromised controller can still create a non-privileged sandbox. For a true
  # "escape ≠ host root" boundary, run a rootless Docker daemon (see README).
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      - CONTAINERS=1
      - EXEC=1
      - POST=1
      # IMAGES enables inspect + pull so the controller's ensureRuntime() can
      # self-heal a pruned sandbox image. DELETE stays off (unset) — the controller
      # can pull/inspect images but not remove them. NOTE: IMAGES also exposes
      # POST /images/load (tar image-injection); the controller never calls it, but
      # treat this as a deliberate, audited widening of the proxy surface.
      - IMAGES=1
      # INFO exposes GET /info (read-only daemon metadata). REQUIRED: the fail-closed
      # secure profile probes /info to confirm the gVisor runtime is registered before
      # booting; without it the probe gets 403 and the controller crash-loops.
      - INFO=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker-proxy
    restart: unless-stopped
    mem_limit: ${SOCKET_PROXY_MEM_LIMIT:-128m}
    pids_limit: ${SOCKET_PROXY_PIDS_LIMIT:-128}

  sandbox-controller:
    build: ./sandbox-controller
    # Prebuilt image (published by .github/workflows/publish-images.yml). `build:`
    # stays as a fallback — `up --build` builds locally, `pull` fetches the image.
    image: ghcr.io/lyosu/capka-controller:${CAPKA_VERSION:-latest}
    expose:
      - "3001"
    # No host Docker socket here anymore — it reaches the daemon through the
    # restricted socket-proxy via DOCKER_HOST. To roll back, drop DOCKER_HOST and
    # re-add `- /var/run/docker.sock:/var/run/docker.sock`.
    volumes:
      - ./data:/data
    environment:
      - CONTROLLER_SECRET=${CONTROLLER_SECRET}
      - DOCKER_HOST=tcp://socket-proxy:2375
      - DATA_ROOT=/data/storage
      # Durable session state (replaces the old in-memory Map): controller survives
      # restarts and reconciles against the daemon on boot.
      - DATABASE_URL=postgresql://Capka:${POSTGRES_PASSWORD}@postgres:5432/Capka
      - COMPUTE_BACKEND=docker
      - WORKSPACE_STORE=local
      # Isolation runtime. Default runc — boots on any Docker host with no extra
      # setup. gVisor is OPT-IN: set SANDBOX_RUNTIME=runsc AND install gVisor on the
      # host (scripts/install-gvisor.sh) to get the hardened, fail-closed secure
      # profile. Recommended for untrusted/multi-tenant workloads.
      - SANDBOX_RUNTIME=${SANDBOX_RUNTIME:-runc}
      # NOTE: no HOST_DATA_ROOT here. The controller auto-detects the daemon-host
      # path backing ./data by inspecting its own mount at startup, so sandbox bind
      # mounts resolve correctly regardless of the launcher's working directory
      # (the old ${PWD} guess broke under Coolify/systemd/non-repo-root launches).
      # Set HOST_DATA_ROOT only to override the auto-detected value.
      - SANDBOX_IMAGE=ghcr.io/lyosu/capka-sandbox:${CAPKA_VERSION:-latest}
      # Sandbox egress kill-switch (deployment-level). The admin panel (Security →
      # Internet access) and the per-project override choose the INTENT; this flag
      # is the deployment gate. Defaults to true so agents can reach the internet
      # out of the box (web scraping, package installs) — granted egress is still
      # firewalled to block private/internal ranges + cloud metadata. Set false to
      # HARD-FORBID egress regardless of any in-app toggle (for untrusted tenants).
      - SANDBOX_ALLOW_NETWORK=${SANDBOX_ALLOW_NETWORK:-true}
    networks:
      - default
      - docker-proxy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      sandbox:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      socket-proxy:
        condition: service_started
    restart: unless-stopped
    mem_limit: ${CONTROLLER_MEM_LIMIT:-1g}
    pids_limit: ${CONTROLLER_PIDS_LIMIT:-512}

  platform:
    build: .
    # Prebuilt image (published on release tags). `build:` stays as a fallback so
    # cloning + building works with no image present; `pull` fetches the image.
    image: ghcr.io/lyosu/capka-platform:${CAPKA_VERSION:-latest}
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql://Capka:${POSTGRES_PASSWORD}@postgres:5432/Capka
      - SANDBOX_CONTROLLER_URL=http://sandbox-controller:3001
      - CONTROLLER_SECRET=${CONTROLLER_SECRET}
      - CAPKA_MASTER_KEY=${CAPKA_MASTER_KEY}
      # Public origin. Optional: unset → derived from proxy headers (X-Forwarded-*).
      # Set it (recommended in prod) so the value can't be spoofed via headers.
      - PUBLIC_URL=${PUBLIC_URL:-}
      # Optional, opt-in hardening for the first-run wizard. Unset (default) ⇒
      # frictionless setup. Set it for a public deploy and claiming admin requires
      # the token, so a stranger can't race you to the setup page. See .env.example.
      - SETUP_TOKEN=${SETUP_TOKEN:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      sandbox-controller:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: ${PLATFORM_MEM_LIMIT:-4g}
    pids_limit: ${PLATFORM_PIDS_LIMIT:-1024}

networks:
  # Isolated link between the controller and the socket-proxy. Nothing else joins
  # it, so the (restricted) Docker API isn't reachable from the rest of the stack.
  docker-proxy:

volumes:
  postgres-data:

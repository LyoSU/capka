services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: unClaw
      POSTGRES_PASSWORD: unClaw
      POSTGRES_DB: unClaw
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unClaw"]
      interval: 5s
      timeout: 5s
      retries: 5

  sandbox-controller:
    build: ./sandbox-controller
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    environment:
      - CONTROLLER_SECRET=${CONTROLLER_SECRET:-unclaw-sandbox-secret}
      - DATA_ROOT=/data/storage
      - SANDBOX_IMAGE=unclaw-sandbox
    depends_on:
      - postgres
    restart: unless-stopped

  platform:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql://unClaw:unClaw@postgres:5432/unClaw
      - SANDBOX_CONTROLLER_URL=http://sandbox-controller:3001
      - CONTROLLER_SECRET=${CONTROLLER_SECRET:-unclaw-sandbox-secret}
    depends_on:
      postgres:
        condition: service_healthy
      sandbox-controller:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:

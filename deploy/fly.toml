# fly.toml — deploy the Capka platform on Fly.io.
#
# NOTE: Fly.io gives your app no Docker daemon, so the sandbox-controller and the
# per-session sandboxes can't run here — this deploys the chat/agent PLATFORM
# ONLY (no sandboxed code execution). For the full product, self-host the compose
# stack on any host with Docker (see README). A future controller backend that
# spawns Fly Machines would lift this limitation.
#
# Setup (see deploy/fly.md):
#   fly launch --no-deploy --copy-config   # uses this file
#   fly postgres create && fly postgres attach <db>   # sets DATABASE_URL
#   fly secrets set CAPKA_MASTER_KEY=$(openssl rand -hex 32) \
#                   CONTROLLER_SECRET=$(openssl rand -hex 32) \
#                   PUBLIC_URL=https://<app>.fly.dev
#   fly deploy

app = "capka"
primary_region = "fra"

[build]
  image = "ghcr.io/lyosu/capka-platform:latest"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
